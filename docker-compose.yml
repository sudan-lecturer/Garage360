version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: garage360-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/dist:/var/www/html:ro
    depends_on:
      - api
    networks:
      - garage360

  api:
    build:
      context: ./api
      dockerfile: ../docker/api.Dockerfile
    container_name: garage360-api
    environment:
      - DATABASE_URL=postgres://postgres:postgres@control-db:5432/control
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      control-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - garage360

  control-db:
    image: postgres:16-alpine
    container_name: garage360-control-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=control
    volumes:
      - control-db-data:/var/lib/postgresql/data
      - ./api/schema/control-db.sql:/docker-entrypoint-initdb.d/control-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - garage360

  redis:
    image: redis:7-alpine
    container_name: garage360-redis
    volumes:
      - redis-data:/data
    networks:
      - garage360

  minio:
    image: minio/minio:latest
    container_name: garage360-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - garage360

volumes:
  control-db-data:
  redis-data:
  minio-data:

networks:
  garage360:
    driver: bridge
